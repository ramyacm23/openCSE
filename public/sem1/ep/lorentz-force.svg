<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg"><title>Lorentz force on a moving charge</title><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:Arial,sans-serif;fill:#1a1a1a}.th{font-size:14px;font-weight:600}.ts{font-size:12px;fill:#444}</style></defs><rect width="680" height="360" fill="#fff"/><text class="ts" x="60" y="40" text-anchor="middle">B (into page)</text><g opacity="0.4"><text x="80" y="100" text-anchor="middle" font-size="16" fill="#333">×</text><text x="140" y="100" text-anchor="middle" font-size="16" fill="#333">×</text><text x="200" y="100" text-anchor="middle" font-size="16" fill="#333">×</text><text x="260" y="100" text-anchor="middle" font-size="16" fill="#333">×</text><text x="80" y="160" text-anchor="middle" font-size="16" fill="#333">×</text><text x="140" y="160" text-anchor="middle" font-size="16" fill="#333">×</text><text x="200" y="160" text-anchor="middle" font-size="16" fill="#333">×</text><text x="260" y="160" text-anchor="middle" font-size="16" fill="#333">×</text><text x="80" y="220" text-anchor="middle" font-size="16" fill="#333">×</text><text x="140" y="220" text-anchor="middle" font-size="16" fill="#333">×</text><text x="200" y="220" text-anchor="middle" font-size="16" fill="#333">×</text><text x="260" y="220" text-anchor="middle" font-size="16" fill="#333">×</text><text x="80" y="280" text-anchor="middle" font-size="16" fill="#333">×</text><text x="140" y="280" text-anchor="middle" font-size="16" fill="#333">×</text><text x="200" y="280" text-anchor="middle" font-size="16" fill="#333">×</text><text x="260" y="280" text-anchor="middle" font-size="16" fill="#333">×</text></g><circle cx="180" cy="190" r="20" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/><text class="th" x="180" y="194" text-anchor="middle" dominant-baseline="central" fill="#0C447C">+q</text><line x1="200" y1="190" x2="270" y2="190" stroke="#1D9E75" stroke-width="2.5" marker-end="url(#arrow)"/><text class="th" x="278" y="186" fill="#1D9E75">v</text><line x1="180" y1="170" x2="180" y2="100" stroke="#D85A30" stroke-width="2.5" marker-end="url(#arrow)"/><text class="th" x="192" y="112" fill="#D85A30">F</text><rect x="360" y="60" width="280" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text class="th" x="500" y="81" text-anchor="middle" dominant-baseline="central">Lorentz force</text><text class="ts" x="500" y="102" text-anchor="middle" dominant-baseline="central">F = q(E + v × B)</text><rect x="360" y="130" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/><text class="th" x="500" y="151" text-anchor="middle" dominant-baseline="central">Magnetic force only</text><text class="ts" x="500" y="172" text-anchor="middle" dominant-baseline="central">F = qv × B (⊥ to v and B)</text><rect x="360" y="200" width="280" height="70" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/><text class="th" x="500" y="222" text-anchor="middle" dominant-baseline="central">Key properties</text><text class="ts" x="500" y="243" text-anchor="middle" dominant-baseline="central">No work done by magnetic force</text><text class="ts" x="500" y="261" text-anchor="middle" dominant-baseline="central">Causes circular/helical motion</text></svg>
