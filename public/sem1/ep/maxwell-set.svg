<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Maxwell's Equations</title>
  <desc>All four Maxwell equations with physical meaning.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>text { font-family: Arial, sans-serif; fill: #1a1a1a; } .th { font-size: 14px; font-weight: 600; } .ts { font-size: 12px; fill: #444; }</style>
  </defs>
  <rect width="680" height="420" fill="#ffffff"/>
  <text class="th" x="340" y="34" text-anchor="middle" style="font-size:16px">Maxwell's Equations</text>
  <rect x="40" y="60" width="290" height="70" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text class="th" x="185" y="84" text-anchor="middle">Gauss's law (Electric)</text>
  <text class="ts" x="185" y="105" text-anchor="middle">∇ · E = ρ/ε₀</text>
  <text class="ts" x="185" y="121" text-anchor="middle">Electric charges are sources of E</text>
  <rect x="350" y="60" width="290" height="70" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text class="th" x="495" y="84" text-anchor="middle">Gauss's law (Magnetic)</text>
  <text class="ts" x="495" y="105" text-anchor="middle">∇ · B = 0</text>
  <text class="ts" x="495" y="121" text-anchor="middle">No magnetic monopoles exist</text>
  <rect x="40" y="160" width="290" height="70" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text class="th" x="185" y="184" text-anchor="middle">Faraday's law</text>
  <text class="ts" x="185" y="205" text-anchor="middle">∇ × E = −∂B/∂t</text>
  <text class="ts" x="185" y="221" text-anchor="middle">Changing B induces E</text>
  <rect x="350" y="160" width="290" height="70" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text class="th" x="495" y="184" text-anchor="middle">Ampere-Maxwell law</text>
  <text class="ts" x="495" y="203" text-anchor="middle">∇ × B = μ₀J + μ₀ε₀ ∂E/∂t</text>
  <text class="ts" x="495" y="221" text-anchor="middle">Currents and changing E induce B</text>
  <rect x="140" y="270" width="400" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text class="th" x="340" y="293" text-anchor="middle">Together → EM wave equation</text>
  <text class="ts" x="340" y="315" text-anchor="middle">c = 1/√(μ₀ε₀) ≈ 3×10⁸ m/s (speed of light)</text>
  <line x1="185" y1="232" x2="260" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="495" y1="232" x2="420" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="340" y="358" text-anchor="middle">Differential forms: point-wise field behaviour</text>
  <text class="ts" x="340" y="378" text-anchor="middle">Integral forms: flux and circulation over surfaces/loops</text>
</svg>
