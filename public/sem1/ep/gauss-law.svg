<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg"><title>Gauss law for electrostatics</title><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:Arial,sans-serif;fill:#1a1a1a}.th{font-size:14px;font-weight:600}.ts{font-size:12px;fill:#444}</style></defs><rect width="680" height="360" fill="#fff"/><ellipse cx="230" cy="180" rx="150" ry="110" fill="#E6F1FB" fill-opacity="0.2" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="8 4"/><circle cx="230" cy="180" r="20" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/><text class="th" x="230" y="184" text-anchor="middle" dominant-baseline="central" fill="#712B13">+Q</text><line x1="230" y1="160" x2="230" y2="80" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="248" y1="165" x2="336" y2="118" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="250" y1="180" x2="382" y2="180" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="248" y1="195" x2="336" y2="242" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="230" y1="200" x2="230" y2="280" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="212" y1="195" x2="124" y2="242" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="210" y1="180" x2="78" y2="180" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="212" y1="165" x2="124" y2="118" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="440" y="60" width="210" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/><text class="th" x="545" y="81" text-anchor="middle" dominant-baseline="central">Gauss's law</text><text class="ts" x="545" y="102" text-anchor="middle" dominant-baseline="central">∯ E · dS = Q_enc / ε₀</text><rect x="440" y="130" width="210" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/><text class="th" x="545" y="151" text-anchor="middle" dominant-baseline="central">Differential form</text><text class="ts" x="545" y="172" text-anchor="middle" dominant-baseline="central">∇ · E = ρ / ε₀</text><rect x="440" y="200" width="210" height="70" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/><text class="th" x="545" y="222" text-anchor="middle" dominant-baseline="central">Applications</text><text class="ts" x="545" y="243" text-anchor="middle" dominant-baseline="central">Spherical, cylindrical,</text><text class="ts" x="545" y="261" text-anchor="middle" dominant-baseline="central">planar symmetry</text></svg>
