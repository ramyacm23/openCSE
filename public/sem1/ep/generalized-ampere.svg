<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Generalized Ampere's Law</title>
  <desc>Maxwell extended Ampere's law by adding displacement current.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>text { font-family: Arial, sans-serif; fill: #1a1a1a; } .th { font-size: 14px; font-weight: 600; } .ts { font-size: 12px; fill: #444; }</style>
  </defs>
  <rect width="680" height="380" fill="#ffffff"/>
  <line x1="200" y1="60" x2="200" y2="290" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <text class="th" x="200" y="47" text-anchor="middle">Current (I)</text>
  <line x1="200" y1="100" x2="200" y2="160" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/>
  <ellipse cx="200" cy="200" rx="100" ry="55" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="8 4"/>
  <path d="M200 145 Q310 145 300 200" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="325" y="176" fill="#1D9E75">∮ B · dl</text>
  <rect x="360" y="50" width="280" height="80" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text class="th" x="500" y="76" text-anchor="middle">Classical Ampere's law</text>
  <text class="ts" x="500" y="101" text-anchor="middle">∮ B · dl = μ₀ I</text>
  <text class="ts" x="500" y="119" text-anchor="middle">(steady currents only)</text>
  <rect x="360" y="160" width="280" height="80" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text class="th" x="500" y="186" text-anchor="middle">Generalized (Maxwell)</text>
  <text class="ts" x="500" y="207" text-anchor="middle">∮ B · dl = μ₀(I + ε₀ dΦ_E/dt)</text>
  <text class="ts" x="500" y="226" text-anchor="middle">includes displacement current</text>
  <rect x="360" y="270" width="280" height="70" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text class="th" x="500" y="293" text-anchor="middle">Differential form</text>
  <text class="ts" x="500" y="317" text-anchor="middle">∇ × B = μ₀J + μ₀ε₀ ∂E/∂t</text>
  <line x1="500" y1="132" x2="500" y2="158" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="510" y="146">Maxwell adds J_d</text>
  <line x1="500" y1="242" x2="500" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="340" y="358" text-anchor="middle">Generalized Ampere law — time-varying E field also generates B field</text>
</svg>
