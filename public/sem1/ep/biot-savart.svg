<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg"><title>Biot-Savart law</title><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:Arial,sans-serif;fill:#1a1a1a}.th{font-size:14px;font-weight:600}.ts{font-size:12px;fill:#444}</style></defs><rect width="680" height="360" fill="#fff"/><line x1="200" y1="50" x2="200" y2="310" stroke="#333" stroke-width="4" stroke-linecap="round" opacity="0.7"/><line x1="200" y1="110" x2="200" y2="160" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/><text class="th" x="216" y="137" fill="#D85A30">I</text><rect x="188" y="178" width="24" height="20" rx="3" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/><text class="ts" x="200" y="191" text-anchor="middle" dominant-baseline="central" fill="#712B13">dl</text><circle cx="420" cy="188" r="7" fill="#534AB7"/><text class="th" x="436" y="190">P</text><line x1="212" y1="188" x2="411" y2="188" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)"/><text class="ts" x="310" y="178" text-anchor="middle" fill="#1D9E75">r̂</text><circle cx="420" cy="140" r="14" fill="none" stroke="#378ADD" stroke-width="1.5"/><circle cx="420" cy="140" r="4" fill="#378ADD"/><text class="ts" x="443" y="140" fill="#378ADD">dB (out)</text><ellipse cx="200" cy="188" rx="100" ry="40" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="6 4" opacity="0.5"/><rect x="430" y="200" width="220" height="70" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/><text class="th" x="540" y="222" text-anchor="middle" dominant-baseline="central">Biot-Savart law</text><text class="ts" x="540" y="243" text-anchor="middle" dominant-baseline="central">dB = μ₀I dl × r̂ / 4πr²</text><text class="ts" x="540" y="261" text-anchor="middle" dominant-baseline="central">B = μ₀I / 2πr (wire)</text><rect x="40" y="295" width="300" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/><text class="th" x="190" y="313" text-anchor="middle" dominant-baseline="central">Right-hand rule</text><text class="ts" x="190" y="330" text-anchor="middle" dominant-baseline="central">Curl fingers → direction of B field</text></svg>
