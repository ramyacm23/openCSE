<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg"><title>p-n junction and depletion region</title><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:Arial,sans-serif;fill:#1a1a1a}.th{font-size:14px;font-weight:600}.ts{font-size:12px;fill:#444}</style></defs><rect width="680" height="360" fill="#fff"/><rect x="40" y="80" width="240" height="160" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/><text class="th" x="160" y="108" text-anchor="middle" fill="#712B13">p-type</text><text class="ts" x="160" y="128" text-anchor="middle" fill="#993C1D">Holes (majority)</text><circle cx="80" cy="165" r="8" fill="none" stroke="#D85A30" stroke-width="1.5"/><circle cx="110" cy="155" r="8" fill="none" stroke="#D85A30" stroke-width="1.5"/><circle cx="90" cy="195" r="8" fill="none" stroke="#D85A30" stroke-width="1.5"/><circle cx="130" cy="185" r="8" fill="none" stroke="#D85A30" stroke-width="1.5"/><circle cx="160" cy="165" r="8" fill="none" stroke="#D85A30" stroke-width="1.5"/><circle cx="150" cy="200" r="8" fill="none" stroke="#D85A30" stroke-width="1.5"/><rect x="400" y="80" width="240" height="160" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/><text class="th" x="520" y="108" text-anchor="middle" fill="#0C447C">n-type</text><text class="ts" x="520" y="128" text-anchor="middle" fill="#185FA5">Electrons (majority)</text><circle cx="440" cy="165" r="7" fill="#378ADD"/><circle cx="470" cy="155" r="7" fill="#378ADD"/><circle cx="450" cy="195" r="7" fill="#378ADD"/><circle cx="500" cy="185" r="7" fill="#378ADD"/><circle cx="530" cy="165" r="7" fill="#378ADD"/><circle cx="510" cy="200" r="7" fill="#378ADD"/><rect x="280" y="80" width="120" height="160" rx="0" fill="#F1EFE8" stroke="#888780" stroke-width="1" stroke-dasharray="5 3"/><text class="th" x="340" y="148" text-anchor="middle" fill="#5F5E5A">Depletion</text><text class="ts" x="340" y="168" text-anchor="middle" fill="#5F5E5A">region</text><line x1="380" y1="230" x2="300" y2="230" stroke="#1D9E75" stroke-width="2" marker-end="url(#arrow)"/><text class="ts" x="340" y="248" text-anchor="middle" fill="#1D9E75">E_built-in</text><rect x="40" y="275" width="280" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/><text class="th" x="180" y="296" text-anchor="middle">Forward bias → current flows</text><text class="ts" x="180" y="317" text-anchor="middle">+ve to p-side, −ve to n-side</text><rect x="360" y="275" width="280" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/><text class="th" x="500" y="296" text-anchor="middle">Reverse bias → no current</text><text class="ts" x="500" y="317" text-anchor="middle">Depletion region widens</text></svg>
