<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg"><title>Superconductivity and Meissner effect</title><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:Arial,sans-serif;fill:#1a1a1a}.th{font-size:14px;font-weight:600}.ts{font-size:12px;fill:#444}</style></defs><rect width="680" height="360" fill="#fff"/><text class="th" x="170" y="36" text-anchor="middle">Normal conductor (T &gt; Tc)</text><ellipse cx="170" cy="175" rx="110" ry="80" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/><text class="ts" x="170" y="175" text-anchor="middle" fill="#5F5E5A">ρ ≠ 0</text><line x1="80" y1="130" x2="260" y2="130" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="80" y1="160" x2="260" y2="160" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="80" y1="190" x2="260" y2="190" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="80" y1="220" x2="260" y2="220" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><text class="ts" x="56" y="175" text-anchor="end" fill="#378ADD">B</text><line x1="310" y1="175" x2="370" y2="175" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/><text class="ts" x="340" y="162" text-anchor="middle">Cool to T &lt; Tc</text><text class="th" x="510" y="36" text-anchor="middle">Superconductor (T &lt; Tc)</text><ellipse cx="510" cy="175" rx="110" ry="80" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2"/><text class="th" x="510" y="162" text-anchor="middle" fill="#085041">ρ = 0</text><text class="ts" x="510" y="182" text-anchor="middle" fill="#0F6E56">B = 0 inside</text><path d="M400 130 Q420 130 430 110 Q450 88 510 83 Q570 88 590 110 Q600 130 620 130" fill="none" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><path d="M400 220 Q420 220 430 240 Q450 262 510 267 Q570 262 590 240 Q600 220 620 220" fill="none" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="60" y="290" width="250" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/><text class="th" x="185" y="308" text-anchor="middle">Meissner effect</text><text class="ts" x="185" y="326" text-anchor="middle">B = 0 inside superconductor</text><rect x="370" y="290" width="250" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/><text class="th" x="495" y="308" text-anchor="middle">Zero resistance</text><text class="ts" x="495" y="326" text-anchor="middle">ρ = 0 for T &lt; Tc</text></svg>
