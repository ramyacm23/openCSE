<svg width="100%" viewBox="0 0 680 390" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Gauss' Divergence Theorem</title>
  <desc>Converts a volume integral of divergence into a surface flux integral.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>text{font-family:Arial,sans-serif;fill:#1a1a1a}.th{font-size:14px;font-weight:600}.ts{font-size:12px;fill:#444}</style>
  </defs>
  <rect width="680" height="390" fill="#fff"/>
  <ellipse cx="185" cy="195" rx="130" ry="100" fill="#FAECE7" fill-opacity="0.35" stroke="#D85A30" stroke-width="1.5"/>
  <circle cx="185" cy="195" r="7" fill="#D85A30" opacity="0.9"/>
  <line x1="185" y1="188" x2="185" y2="102" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="192" y1="190" x2="280" y2="158" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="192" y1="200" x2="280" y2="232" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="185" y1="202" x2="185" y2="288" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="178" y1="200" x2="90" y2="232" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="178" y1="190" x2="90" y2="158" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="185" y="345" text-anchor="middle">Volume V with source ∇·A inside</text>
  <text class="ts" x="308" y="158" fill="#D85A30">n̂ (outward)</text>
  <text class="th" x="340" y="195" text-anchor="middle" style="font-size:28px">=</text>
  <ellipse cx="510" cy="195" rx="130" ry="100" fill="#E6F1FB" fill-opacity="0.35" stroke="#378ADD" stroke-width="1.5"/>
  <line x1="510" y1="188" x2="510" y2="102" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="518" y1="190" x2="608" y2="158" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="518" y1="200" x2="608" y2="232" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="202" x2="510" y2="288" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="502" y1="200" x2="412" y2="232" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="502" y1="190" x2="412" y2="158" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="510" y="345" text-anchor="middle">Closed surface S bounding V</text>
  <rect x="40" y="30" width="240" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text class="th" x="160" y="56" text-anchor="middle">∭ (∇·A) dV</text>
  <rect x="400" y="30" width="240" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text class="th" x="520" y="56" text-anchor="middle">∬ A · n̂ dS</text>
  <text class="th" x="340" y="56" text-anchor="middle" style="font-size:20px">=</text>
  <rect x="120" y="300" width="440" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text class="th" x="340" y="320" text-anchor="middle">Applications</text>
  <text class="ts" x="340" y="342" text-anchor="middle">Gauss's law in electrostatics · Flux through symmetric surfaces</text>
</svg>
