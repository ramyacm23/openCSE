<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg"><title>Energy band diagram</title><defs><style>text{font-family:Arial,sans-serif;fill:#1a1a1a}.th{font-size:14px;font-weight:600}.ts{font-size:12px;fill:#444}</style></defs><rect width="680" height="380" fill="#fff"/><text class="th" x="155" y="42" text-anchor="middle">Conductor</text><rect x="80" y="130" width="150" height="70" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/><text class="ts" x="155" y="160" text-anchor="middle" fill="#0C447C">Conduction band</text><text class="ts" x="155" y="178" text-anchor="middle" fill="#0C447C">(partially filled)</text><rect x="80" y="185" width="150" height="70" rx="4" fill="#85B7EB" stroke="#378ADD" stroke-width="0.5"/><text class="ts" x="155" y="215" text-anchor="middle" fill="#0C447C">Valence band</text><text class="ts" x="155" y="233" text-anchor="middle" fill="#0C447C">(overlap)</text><text class="ts" x="155" y="310" text-anchor="middle">Band gap ≈ 0 eV</text><text class="th" x="340" y="42" text-anchor="middle">Semiconductor</text><rect x="265" y="115" width="150" height="60" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/><text class="ts" x="340" y="145" text-anchor="middle" fill="#0C447C">Conduction band</text><text class="ts" x="340" y="197" text-anchor="middle" fill="#D85A30">Eg ≈ 1–2 eV</text><rect x="265" y="210" width="150" height="60" rx="4" fill="#85B7EB" stroke="#378ADD" stroke-width="0.5"/><text class="ts" x="340" y="240" text-anchor="middle" fill="#0C447C">Valence band (full)</text><text class="ts" x="340" y="310" text-anchor="middle">Si: 1.1 eV, Ge: 0.67 eV</text><text class="th" x="530" y="42" text-anchor="middle">Insulator</text><rect x="455" y="80" width="150" height="60" rx="4" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/><text class="ts" x="530" y="110" text-anchor="middle" fill="#0C447C">Conduction band</text><text class="ts" x="530" y="185" text-anchor="middle" fill="#D85A30">Eg > 5 eV</text><rect x="455" y="228" width="150" height="60" rx="4" fill="#85B7EB" stroke="#378ADD" stroke-width="0.5"/><text class="ts" x="530" y="258" text-anchor="middle" fill="#0C447C">Valence band (full)</text><text class="ts" x="530" y="310" text-anchor="middle">Diamond: ~5.5 eV</text><text class="ts" x="340" y="348" text-anchor="middle">Band gap determines electrical conductivity of a material</text></svg>
