<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg"><title>Equation of Continuity</title><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:Arial,sans-serif;fill:#1a1a1a}.th{font-size:14px;font-weight:600}.ts{font-size:12px;fill:#444}</style></defs><rect width="680" height="320" fill="#fff"/><ellipse cx="220" cy="160" rx="140" ry="95" fill="#E6F1FB" fill-opacity="0.25" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="7 4"/><text class="th" x="220" y="148" text-anchor="middle">ρ (decreasing)</text><text class="ts" x="220" y="168" text-anchor="middle">∂ρ/∂t &lt; 0</text><line x1="220" y1="145" x2="220" y2="78" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/><line x1="240" y1="148" x2="324" y2="108" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/><line x1="248" y1="160" x2="362" y2="160" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/><line x1="240" y1="172" x2="324" y2="212" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/><line x1="220" y1="175" x2="220" y2="242" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/><line x1="200" y1="172" x2="116" y2="212" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/><line x1="192" y1="160" x2="78" y2="160" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/><text class="ts" x="370" y="155" fill="#D85A30">J (current density)</text><rect x="430" y="60" width="220" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/><text class="th" x="540" y="81" text-anchor="middle" dominant-baseline="central">Continuity equation</text><text class="ts" x="540" y="102" text-anchor="middle" dominant-baseline="central">∇ · J + ∂ρ/∂t = 0</text><rect x="430" y="130" width="220" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/><text class="th" x="540" y="151" text-anchor="middle" dominant-baseline="central">Integral form</text><text class="ts" x="540" y="172" text-anchor="middle" dominant-baseline="central">∯ J · dS = −dQ/dt</text><rect x="430" y="200" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/><text class="th" x="540" y="221" text-anchor="middle" dominant-baseline="central">Physical meaning</text><text class="ts" x="540" y="242" text-anchor="middle" dominant-baseline="central">Charge is always conserved</text></svg>
