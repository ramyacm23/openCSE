<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Electromagnetic plane wave in free space</title>
  <desc>E and B fields are mutually perpendicular and both perpendicular to the direction of propagation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>text { font-family: Arial, sans-serif; fill: #1a1a1a; } .th { font-size: 14px; font-weight: 600; } .ts { font-size: 12px; fill: #444; }</style>
  </defs>
  <rect width="680" height="400" fill="#ffffff"/>
  <line x1="60" y1="210" x2="620" y2="210" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="590" y1="210" x2="630" y2="210" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="th" x="645" y="214">z</text>
  <path d="M60 210 C 90 210, 100 110, 130 110 C 160 110, 170 210, 200 210 C 230 210, 240 310, 270 310 C 300 310, 310 210, 340 210 C 370 210, 380 110, 410 110 C 440 110, 450 210, 480 210 C 510 210, 520 310, 550 310 C 580 310, 590 210, 620 210" fill="none" stroke="#378ADD" stroke-width="2.5"/>
  <line x1="130" y1="165" x2="130" y2="112" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="255" x2="270" y2="308" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="165" x2="410" y2="112" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="255" x2="550" y2="308" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="th" x="42" y="120" text-anchor="middle" fill="#378ADD">E</text>
  <line x1="42" y1="135" x2="42" y2="210" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M60 210 C 90 210, 100 170, 130 170 C 160 170, 170 210, 200 210 C 230 210, 240 250, 270 250 C 300 250, 310 210, 340 210 C 370 210, 380 170, 410 170 C 440 170, 450 210, 480 210 C 510 210, 520 250, 550 250 C 580 250, 590 210, 620 210" fill="none" stroke="#D85A30" stroke-width="2.5"/>
  <text class="th" x="42" y="300" text-anchor="middle" fill="#D85A30">B</text>
  <line x1="42" y1="285" x2="42" y2="210" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="123" y="104" width="12" height="12" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="350" x2="120" y2="350" stroke="#378ADD" stroke-width="2.5"/>
  <text class="ts" x="128" y="354">Electric field (E)</text>
  <line x1="280" y1="350" x2="320" y2="350" stroke="#D85A30" stroke-width="2.5"/>
  <text class="ts" x="328" y="354">Magnetic field (B)</text>
  <line x1="480" y1="350" x2="520" y2="350" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text class="ts" x="528" y="354">Propagation (z)</text>
  <rect x="220" y="30" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text class="th" x="340" y="52" text-anchor="middle">Speed of light</text>
  <text class="ts" x="340" y="72" text-anchor="middle">c = 1/√(μ₀ε₀) ≈ 3×10⁸ m/s</text>
  <text class="ts" x="340" y="386" text-anchor="middle">E ⊥ B ⊥ direction of propagation — transverse wave</text>
</svg>
