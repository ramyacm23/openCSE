<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Gradient, Divergence and Curl</title>
  <desc>Three fundamental vector operators used in electromagnetism.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>text{font-family:Arial,sans-serif;fill:#1a1a1a}.th{font-size:14px;font-weight:600}.ts{font-size:12px;fill:#444}</style>
  </defs>
  <rect width="680" height="400" fill="#fff"/>
  <rect x="30" y="40" width="190" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text class="th" x="125" y="66" text-anchor="middle">Gradient  ∇φ</text>
  <ellipse cx="125" cy="175" rx="18" ry="12" fill="none" stroke="#378ADD" stroke-width="1" opacity="0.9"/>
  <ellipse cx="125" cy="175" rx="36" ry="24" fill="none" stroke="#378ADD" stroke-width="0.8" opacity="0.7"/>
  <ellipse cx="125" cy="175" rx="54" ry="36" fill="none" stroke="#378ADD" stroke-width="0.6" opacity="0.5"/>
  <line x1="125" y1="163" x2="125" y2="143" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="137" y1="166" x2="152" y2="153" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="113" y1="166" x2="98" y2="153" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="125" y1="187" x2="125" y2="207" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="137" y1="184" x2="152" y2="197" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="113" y1="184" x2="98" y2="197" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="30" y="230" width="190" height="70" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text class="ts" x="125" y="250" text-anchor="middle">Scalar φ → vector field</text>
  <text class="ts" x="125" y="268" text-anchor="middle">Points in steepest rise</text>
  <text class="ts" x="125" y="288" text-anchor="middle">∇φ = (∂φ/∂x, ∂φ/∂y, ∂φ/∂z)</text>
  <rect x="245" y="40" width="190" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text class="th" x="340" y="66" text-anchor="middle">Divergence  ∇·A</text>
  <circle cx="340" cy="175" r="6" fill="#D85A30" opacity="0.8"/>
  <line x1="340" y1="169" x2="340" y2="143" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="346" y1="171" x2="368" y2="153" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="346" y1="179" x2="368" y2="197" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="181" x2="340" y2="207" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="334" y1="179" x2="312" y2="197" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="334" y1="171" x2="312" y2="153" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="346" y1="175" x2="372" y2="175" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="334" y1="175" x2="308" y2="175" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="245" y="230" width="190" height="70" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text class="ts" x="340" y="250" text-anchor="middle">Vector A → scalar field</text>
  <text class="ts" x="340" y="268" text-anchor="middle">Source (+) or sink (−)</text>
  <text class="ts" x="340" y="288" text-anchor="middle">∇·A = ∂Ax/∂x + ∂Ay/∂y + ∂Az/∂z</text>
  <rect x="460" y="40" width="190" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text class="th" x="555" y="66" text-anchor="middle">Curl  ∇×A</text>
  <path d="M555 148 A 30 30 0 1 1 524 175" fill="none" stroke="#1D9E75" stroke-width="1.8" marker-end="url(#arrow)"/>
  <circle cx="555" cy="175" r="5" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  <circle cx="555" cy="175" r="2" fill="#1D9E75"/>
  <rect x="460" y="230" width="190" height="70" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text class="ts" x="555" y="250" text-anchor="middle">Vector A → vector field</text>
  <text class="ts" x="555" y="268" text-anchor="middle">Rotation / swirl strength</text>
  <text class="ts" x="555" y="288" text-anchor="middle">∇×A — axis = rotation axis</text>
  <rect x="30" y="320" width="190" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text class="ts" x="125" y="338" text-anchor="middle">Heat flow,</text>
  <text class="ts" x="125" y="356" text-anchor="middle">potential changes</text>
  <rect x="245" y="320" width="190" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text class="ts" x="340" y="338" text-anchor="middle">Charge distribution,</text>
  <text class="ts" x="340" y="356" text-anchor="middle">fluid outflow</text>
  <rect x="460" y="320" width="190" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text class="ts" x="555" y="338" text-anchor="middle">Magnetic field</text>
  <text class="ts" x="555" y="356" text-anchor="middle">around conductors</text>
  <text class="ts" x="340" y="388" text-anchor="middle">These three operators are the mathematical foundation of all electromagnetic theory</text>
</svg>
