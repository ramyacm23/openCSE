<svg width="100%" viewBox="0 0 680 390" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Stokes' Theorem</title>
  <desc>Relates the line integral around a closed loop to the surface integral of curl over the bounded surface.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>text{font-family:Arial,sans-serif;fill:#1a1a1a}.th{font-size:14px;font-weight:600}.ts{font-size:12px;fill:#444}</style>
  </defs>
  <rect width="680" height="390" fill="#fff"/>
  <ellipse cx="175" cy="195" rx="120" ry="75" fill="#EEEDFE" fill-opacity="0.3" stroke="#534AB7" stroke-width="2"/>
  <path d="M175 120 Q300 120 293 195" fill="none" stroke="#534AB7" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="175" y1="122" x2="220" y2="122" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="283" y1="158" x2="293" y2="195" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="175" y1="268" x2="130" y2="268" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="67" y1="232" x2="57" y2="195" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="th" x="175" y="346" text-anchor="middle">Boundary loop C</text>
  <text class="ts" x="175" y="364" text-anchor="middle">∮ A · dl</text>
  <text class="th" x="340" y="195" text-anchor="middle" style="font-size:28px">=</text>
  <ellipse cx="510" cy="195" rx="120" ry="75" fill="#E1F5EE" fill-opacity="0.5" stroke="#1D9E75" stroke-width="2" stroke-dasharray="7 4"/>
  <path d="M510 160 A 28 28 0 1 1 481 195" fill="none" stroke="#1D9E75" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="510" y1="185" x2="510" y2="148" stroke="#1D9E75" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="516" y="143" fill="#1D9E75">n̂</text>
  <path d="M555 175 A 16 16 0 1 1 538 190" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M468 210 A 14 14 0 1 1 453 222" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.6"/>
  <text class="th" x="510" y="346" text-anchor="middle">Surface S (bounded by C)</text>
  <text class="ts" x="510" y="364" text-anchor="middle">∬ (∇×A) · n̂ dS</text>
  <rect x="40" y="28" width="220" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text class="th" x="150" y="54" text-anchor="middle">∮_C  A · dl</text>
  <rect x="420" y="28" width="220" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text class="th" x="530" y="54" text-anchor="middle">∬_S (∇×A) · n̂ dS</text>
  <text class="th" x="340" y="54" text-anchor="middle" style="font-size:20px">=</text>
  <rect x="100" y="295" width="480" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text class="th" x="340" y="315" text-anchor="middle">Applications</text>
  <text class="ts" x="340" y="337" text-anchor="middle">Magnetostatics · Faraday's law integral form · Ampere's law</text>
</svg>
