<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg"><title>Ampere Circuital Law</title><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:Arial,sans-serif;fill:#1a1a1a}.th{font-size:14px;font-weight:600}.ts{font-size:12px;fill:#444}</style></defs><rect width="680" height="340" fill="#fff"/><line x1="230" y1="50" x2="230" y2="300" stroke="#333" stroke-width="4" stroke-linecap="round" opacity="0.7"/><line x1="230" y1="100" x2="230" y2="150" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/><text class="th" x="246" y="127" fill="#D85A30">I</text><ellipse cx="230" cy="185" rx="120" ry="70" fill="none" stroke="#1D9E75" stroke-width="2"/><path d="M230 115 Q358 115 350 185" fill="none" stroke="#1D9E75" stroke-width="2" marker-end="url(#arrow)"/><text class="ts" x="368" y="148" fill="#1D9E75">Amperian loop</text><rect x="420" y="60" width="230" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/><text class="th" x="535" y="81" text-anchor="middle" dominant-baseline="central">Ampere's law</text><text class="ts" x="535" y="102" text-anchor="middle" dominant-baseline="central">∮ B · dl = μ₀ I_enc</text><rect x="420" y="130" width="230" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/><text class="th" x="535" y="151" text-anchor="middle" dominant-baseline="central">Differential form</text><text class="ts" x="535" y="172" text-anchor="middle" dominant-baseline="central">∇ × B = μ₀ J</text><rect x="420" y="200" width="230" height="70" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/><text class="th" x="535" y="222" text-anchor="middle" dominant-baseline="central">Applications</text><text class="ts" x="535" y="243" text-anchor="middle" dominant-baseline="central">Solenoid, toroid,</text><text class="ts" x="535" y="261" text-anchor="middle" dominant-baseline="central">infinite wire B field</text></svg>
