<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg"><title>Electric field and Coulomb's law</title><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:Arial,sans-serif;fill:#1a1a1a}.th{font-size:14px;font-weight:600}.ts{font-size:12px;fill:#444}</style></defs><rect width="680" height="380" fill="#fff"/><circle cx="170" cy="170" r="24" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/><text class="th" x="170" y="174" text-anchor="middle" dominant-baseline="central" fill="#0C447C">+q</text><line x1="170" y1="146" x2="170" y2="76" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="187" y1="153" x2="240" y2="100" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="194" y1="170" x2="264" y2="170" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="187" y1="187" x2="240" y2="240" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="170" y1="194" x2="170" y2="264" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="153" y1="187" x2="100" y2="240" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="146" y1="170" x2="76" y2="170" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="153" y1="153" x2="100" y2="100" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><text class="ts" x="170" y="46" text-anchor="middle">E field lines (radiate outward from +q)</text><circle cx="460" cy="130" r="22" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/><text class="th" x="460" y="134" text-anchor="middle" dominant-baseline="central" fill="#0C447C">+q₁</text><circle cx="600" cy="130" r="22" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/><text class="th" x="600" y="134" text-anchor="middle" dominant-baseline="central" fill="#712B13">−q₂</text><line x1="484" y1="130" x2="576" y2="130" stroke="#1D9E75" stroke-width="2" marker-end="url(#arrow)"/><line x1="576" y1="130" x2="484" y2="130" stroke="#1D9E75" stroke-width="2" marker-end="url(#arrow)"/><text class="ts" x="530" y="115" text-anchor="middle" fill="#1D9E75">F (attraction)</text><rect x="400" y="195" width="250" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/><text class="th" x="525" y="216" text-anchor="middle" dominant-baseline="central">Coulomb's law</text><text class="ts" x="525" y="237" text-anchor="middle" dominant-baseline="central">F = q₁q₂ / (4πε₀r²) r̂</text><rect x="400" y="265" width="250" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/><text class="th" x="525" y="286" text-anchor="middle" dominant-baseline="central">Electric field</text><text class="ts" x="525" y="307" text-anchor="middle" dominant-baseline="central">E = F/q</text><rect x="40" y="295" width="310" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/><text class="th" x="195" y="313" text-anchor="middle" dominant-baseline="central">Superposition principle</text><text class="ts" x="195" y="330" text-anchor="middle" dominant-baseline="central">E_net = E₁ + E₂ + ...</text></svg>
