<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Displacement Current</title>
  <desc>Maxwell's displacement current in a capacitor gap maintains continuity of Ampere's law.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>text { font-family: Arial, sans-serif; fill: #1a1a1a; } .th { font-size: 14px; font-weight: 600; } .ts { font-size: 12px; fill: #444; }</style>
  </defs>
  <rect width="680" height="400" fill="#ffffff"/>
  <line x1="40" y1="200" x2="180" y2="200" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="500" y1="200" x2="640" y2="200" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <rect x="178" y="140" width="14" height="120" rx="2" fill="#555"/>
  <rect x="508" y="140" width="14" height="120" rx="2" fill="#555"/>
  <rect x="194" y="140" width="312" height="120" rx="0" fill="#F0F8FF" fill-opacity="0.5" stroke="#aaa" stroke-width="1" stroke-dasharray="6 4"/>
  <line x1="260" y1="200" x2="320" y2="200" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="320" y1="200" x2="380" y2="200" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="200" x2="440" y2="200" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="350" y="172" text-anchor="middle" fill="#378ADD">E field (∂E/∂t ≠ 0)</text>
  <line x1="80" y1="200" x2="140" y2="200" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="ts" x="110" y="182" text-anchor="middle" fill="#D85A30">I (conduction)</text>
  <line x1="540" y1="200" x2="600" y2="200" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="ts" x="570" y="182" text-anchor="middle" fill="#D85A30">I (continues)</text>
  <text class="th" x="350" y="229" text-anchor="middle">Displacement current</text>
  <text class="ts" x="350" y="249" text-anchor="middle">J_d = ε₀ ∂E/∂t</text>
  <text class="ts" x="165" y="130" text-anchor="middle">+Q</text>
  <text class="ts" x="525" y="130" text-anchor="middle">−Q</text>
  <rect x="40" y="295" width="270" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text class="th" x="175" y="316" text-anchor="middle">Maxwell's addition</text>
  <text class="ts" x="175" y="337" text-anchor="middle">J_d = ε₀ ∂E/∂t</text>
  <rect x="370" y="295" width="270" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text class="th" x="505" y="316" text-anchor="middle">Continuity maintained</text>
  <text class="ts" x="505" y="337" text-anchor="middle">∇ · J + ∂ρ/∂t = 0</text>
  <text class="ts" x="340" y="28" text-anchor="middle">Displacement current — fills the gap in Ampere's law for time-varying fields</text>
</svg>
