<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg"><title>Electric potential and equipotential surfaces</title><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:Arial,sans-serif;fill:#1a1a1a}.th{font-size:14px;font-weight:600}.ts{font-size:12px;fill:#444}</style></defs><rect width="680" height="360" fill="#fff"/><circle cx="240" cy="180" r="30" fill="none" stroke="#D85A30" stroke-width="1.2" stroke-dasharray="5 3"/><circle cx="240" cy="180" r="60" fill="none" stroke="#D85A30" stroke-width="1" stroke-dasharray="5 3" opacity="0.8"/><circle cx="240" cy="180" r="90" fill="none" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="5 3" opacity="0.6"/><circle cx="240" cy="180" r="120" fill="none" stroke="#D85A30" stroke-width="0.6" stroke-dasharray="5 3" opacity="0.4"/><text class="ts" x="275" y="176" fill="#D85A30">V₁</text><text class="ts" x="305" y="176" fill="#D85A30">V₂</text><text class="ts" x="335" y="176" fill="#D85A30">V₃</text><text class="ts" x="364" y="176" fill="#D85A30">V₄</text><line x1="240" y1="150" x2="240" y2="90" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="261" y1="159" x2="302" y2="118" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="270" y1="180" x2="330" y2="180" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="261" y1="201" x2="302" y2="242" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="240" y1="210" x2="240" y2="270" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/><circle cx="240" cy="180" r="18" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/><text class="th" x="240" y="184" text-anchor="middle" dominant-baseline="central" fill="#0C447C">+q</text><rect x="430" y="60" width="220" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/><text class="th" x="540" y="81" text-anchor="middle" dominant-baseline="central">Electric potential</text><text class="ts" x="540" y="102" text-anchor="middle" dominant-baseline="central">V = q / (4πε₀r)</text><rect x="430" y="130" width="220" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/><text class="th" x="540" y="151" text-anchor="middle" dominant-baseline="central">Relation to E field</text><text class="ts" x="540" y="172" text-anchor="middle" dominant-baseline="central">E = −∇V</text><rect x="430" y="200" width="220" height="70" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/><text class="th" x="540" y="222" text-anchor="middle" dominant-baseline="central">Key property</text><text class="ts" x="540" y="243" text-anchor="middle" dominant-baseline="central">E field always ⊥</text><text class="ts" x="540" y="261" text-anchor="middle" dominant-baseline="central">equipotential surfaces</text></svg>
